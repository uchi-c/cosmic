<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A modern responsive fashion e-commerce prototype with WhatsApp checkout."
    />
    <title>COSMIC DEPT | Fashion Store</title>
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header" data-header>
      <a href="#home" class="brand" aria-label="COSMIC DEPT home">COSMIC DEPT</a>

      <button class="icon-button nav-toggle" data-nav-toggle aria-label="Open menu">
        <span></span>
        <span></span>
      </button>

      <nav class="site-nav" data-nav>
        <a href="#home">Home</a>
        <a href="#shop">Shop</a>
        <a href="#categories">Categories</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
      </nav>

      <button class="cart-trigger" data-cart-open aria-label="Open cart">
        Cart <span data-cart-count>0</span>
      </button>
    </header>

    <main id="app" tabindex="-1"></main>

    <aside class="cart-panel" data-cart-panel aria-label="Shopping cart and checkout" aria-hidden="true">
      <div class="cart-panel__header">
        <div>
          <p class="eyebrow">Cart -> Details -> Payment -> Confirm</p>
          <h2>Checkout</h2>
        </div>
        <button class="icon-button" data-cart-close aria-label="Close cart">x</button>
      </div>
      <div class="cart-panel__body">
        <section class="checkout-section">
          <div class="checkout-section__heading">
            <span>01</span>
            <h3>Cart</h3>
          </div>
          <div class="cart-items" data-cart-items></div>
        </section>

        <section class="checkout-section">
          <div class="checkout-section__heading">
            <span>02</span>
            <h3>Customer Details</h3>
          </div>
          <form class="checkout-form" data-checkout-form>
            <label>
              Full name
              <input type="text" name="fullName" placeholder="Your full name" autocomplete="name" required />
            </label>
            <label>
              Phone number
              <input type="tel" name="phone" placeholder="+260..." autocomplete="tel" required />
            </label>
            <label>
              Delivery location
              <textarea name="location" placeholder="Area, city, landmark or delivery notes" rows="3" required></textarea>
            </label>
          </form>
        </section>

        <section class="checkout-section">
          <div class="checkout-section__heading">
            <span>03</span>
            <h3>Payment Method</h3>
          </div>
          <div class="payment-grid" data-payment-methods>
            <button class="payment-card is-active" type="button" data-payment="MTN Mobile Money">
              <strong>MTN Mobile Money</strong>
              <span>Manual payment</span>
            </button>
            <button class="payment-card" type="button" data-payment="Airtel Money">
              <strong>Airtel Money</strong>
              <span>Manual payment</span>
            </button>
            <button class="payment-card" type="button" data-payment="Zamtel Money">
              <strong>Zamtel Money</strong>
              <span>Manual payment</span>
            </button>
            <button class="payment-card payment-card--soon" type="button" data-payment="Card Payment - Phase 2">
              <strong>Card Payment</strong>
              <span>Phase 2: Stripe, Paystack, Flutterwave, DPO Group</span>
            </button>
          </div>
          <div class="payment-instructions" data-payment-instructions></div>
        </section>
      </div>
      <div class="cart-panel__footer">
        <p class="cart-note">Confirming opens WhatsApp with your order, customer details, payment method, and reference number ready to send.</p>
        <div class="cart-total">
          <span>Total</span>
          <strong data-cart-total>R0</strong>
        </div>
        <button class="button button--dark button--full" data-checkout>Confirm Order on WhatsApp</button>
      </div>
    </aside>
    <div class="overlay" data-overlay></div>

    <a
      class="whatsapp-float"
      data-whatsapp-float
      href="https://wa.me/260764018773"
      target="_blank"
      rel="noreferrer"
      aria-label="Chat on WhatsApp"
    >
      WA
    </a>

    <template id="product-card-template">
      <article class="product-card reveal">
        <a class="product-card__image-link" href="#">
          <img alt="" loading="lazy" />
        </a>
        <div class="product-card__body">
          <div>
            <p class="product-card__category"></p>
            <h3></h3>
          </div>
          <strong></strong>
        </div>
        <div class="product-card__actions">
          <a class="button button--light product-card__view" href="#">View Product</a>
          <button class="button button--dark product-card__quick">Add to Cart</button>
        </div>
      </article>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
