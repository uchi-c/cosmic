<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A modern responsive fashion e-commerce prototype with WhatsApp checkout."
    />
    <title>COSMIC DEPT | Fashion Store</title>
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header" data-header>
      <a href="#home" class="brand" aria-label="COSMIC DEPT home">COSMIC DEPT</a>

      <button class="icon-button nav-toggle" data-nav-toggle aria-label="Open menu">
        <span></span>
        <span></span>
      </button>

      <nav class="site-nav" data-nav>
        <a href="#home">Home</a>
        <a href="#shop">Shop</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
      </nav>

      <button class="cart-trigger" data-cart-open aria-label="Open cart">
        Cart <span data-cart-count>0</span>
      </button>
    </header>

    <main id="app" tabindex="-1"></main>

    <aside class="cart-panel" data-cart-panel aria-label="Shopping cart" aria-hidden="true">
      <div class="cart-panel__header">
        <div>
          <p class="eyebrow">Your Selection</p>
          <h2>Cart</h2>
        </div>
        <button class="icon-button" data-cart-close aria-label="Close cart">x</button>
      </div>
      <div class="cart-items" data-cart-items></div>
      <div class="cart-panel__footer">
        <p class="cart-note">Checkout opens WhatsApp with your item summary ready to send.</p>
        <div class="cart-total">
          <span>Total</span>
          <strong data-cart-total>R0</strong>
        </div>
        <button class="button button--dark button--full" data-checkout>Checkout via WhatsApp</button>
      </div>
    </aside>
    <div class="overlay" data-overlay></div>

    <a
      class="whatsapp-float"
      data-whatsapp-float
      href="https://wa.me/27000000000"
      target="_blank"
      rel="noreferrer"
      aria-label="Chat on WhatsApp"
    >
      WA
    </a>

    <template id="product-card-template">
      <article class="product-card reveal">
        <a class="product-card__image-link" href="#">
          <img alt="" loading="lazy" />
        </a>
        <div class="product-card__body">
          <div>
            <p class="product-card__category"></p>
            <h3></h3>
          </div>
          <strong></strong>
        </div>
        <div class="product-card__actions">
          <a class="button button--light product-card__view" href="#">View Product</a>
          <button class="button button--dark product-card__quick">Add to Cart</button>
        </div>
      </article>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
